services:
  edge-backend:
    build:
      context: .
      dockerfile: apps/edge-agent/backend/Dockerfile
    environment:
      MERGEN_CORS_ORIGINS: http://127.0.0.1:3000,http://localhost:3000
    ports:
      - "8080:8080"
    volumes:
      - ./apps/edge-agent/backend/classroom.db:/app/backend/classroom.db
      - ./apps/edge-agent/photos:/app/photos
      - ./apps/edge-agent/uploads:/app/uploads
      - ./apps/edge-agent/clips:/app/clips

  edge-web:
    build:
      context: .
      dockerfile: apps/edge-agent/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE: http://127.0.0.1:8080
      MERGEN_BACKEND_ORIGIN: http://edge-backend:8080
    ports:
      - "3000:3000"
    depends_on:
      - edge-backend
